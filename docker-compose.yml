version: "3.9"

services:
  rag-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-service
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./documents:/app/documents
      - ./vector_db:/app/vector_db
      - ./cache:/app/cache
      - ./records:/app/records
      - ./model_cache:/app/model_cache
    restart: unless-stopped
